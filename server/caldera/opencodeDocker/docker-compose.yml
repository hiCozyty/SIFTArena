services:
  opencode-ability:
    build: .
    ports:
      - "3111:3111"
    env_file: ../../../.env
    working_dir: /workspace/abilityGeneration
    volumes:
      - ./abilityGeneration/opencode.json:/workspace/abilityGeneration/opencode.json
      - ./abilityGeneration/AGENTS.md:/workspace/abilityGeneration/AGENTS.md
    restart: unless-stopped
    command: ["opencode", "serve", "--port", "3111", "--hostname", "0.0.0.0"]

  opencode-background:
    build: .
    ports:
      - "3112:3112"
    env_file: ../../../.env
    working_dir: /workspace/noiseGeneration
    volumes:
      - ./noiseGeneration/opencode.json:/workspace/noiseGeneration/opencode.json
      - ./noiseGeneration/AGENTS.md:/workspace/noiseGeneration/AGENTS.md
      - ../../data/noises.db:/workspace/noiseGeneration/noises.db:ro
    restart: unless-stopped
    command: ["opencode", "serve", "--port", "3112", "--hostname", "0.0.0.0"]
